# Training Configuration for DINO WSSS
# Weakly Supervised Semantic Segmentation using DINO

# Model Parameters
model:
  num_classes: 21
  backbone_name: "dinov3_vitl16"
  num_transformer_blocks: 1
  num_conv_blocks: 2
  out_channels: 21
  use_bottleneck: false
  use_transpose_conv: false

# Training Parameters
training:
  batch_size: 16
  num_epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  momentum: 0.9
  ignore_index: 255
  validation_interval: 10
  train_only: false
  test_time_augmentation:
    enabled: false
    scales: [0.9, 0.95, 1.0, 1.05, 1.1]  # Multi-scale factors relative to base size

# Loss Parameters
loss:
  potts_type: 'quadratic'
  contour_method: 'fastsam'  # 'sam', 'fastsam', 'gt', 'color_diff'

# Dataset Parameters
dataset:
  dataset_name: 'voc'
  n_images: -1
  root: '.'
  train_image_set: 'train'
  val_image_set: 'val'
  download: false

# Directory Structure
directories:
  output: 'output_15_bicycle'
  checkpoints: 'checkpoints'
  visualizations: 'vis_{num_epochs}epochs_t=0.05mm_fg_w=100_dl=3'

# File Paths
paths:
  model_checkpoint: 'output_10/checkpoints/10epochs_t=0.05mm_bicycle_fg_weighted_lr=0.001.pt'
  model: 'output_15_bicycle/checkpoints/{num_epochs}epochs_t=0.05mm_fg_w=100_dl=3.pt'
  sam_checkpoint: 'sam_checkpoint/sam_vit_b_01ec64.pth'

# Visualization Parameters
visualization:
  train_sample_interval: 50
  val_sample_interval: 50

# Weights & Biases Configuration
wandb:
  project: "WSSS"
  entity: "joshlicoding-university-of-waterloo"
  log_visualizations: false
